<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MobGuessr</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>

<header>
  <h1>MobGuessr</h1>
  <p>Guess Minecraft mobs by image + sound</p>
</header>

<nav>
  <ul>
    <li><a href="#" id="leaderboardLink">Leaderboard</a></li>
    <li><a href="#" id="colorBlindnessLink">Settings</a></li>
  </ul>
</nav>

<main>

  <!-- START -->
  <div id="startScreen">
    <h2>Welcome</h2>
    <button id="startButton">Start Game</button>
  </div>

  <!-- GAME -->
  <div id="gameScreen" class="hidden">

    <p id="currentPoints">Current points: 0</p>

    <h2>What mob is this?</h2>

    <div class="image-sound-player">
      <img id="mobImage" src="" alt="mob">
      <button id="playSoundAgainButton">Play Sound</button>
    </div>

    <div class="options-container">
      <button class="option-button"></button>
      <button class="option-button"></button>
      <button class="option-button"></button>
      <button class="option-button"></button>
    </div>

  </div>

  <!-- RESULTS -->
  <div id="resultsScreen" class="hidden">
    <h2>Game Over!</h2>
    <h3>Score: <span id="finalPoints">0</span></h3>
    <button onclick="location.reload()">Play Again</button>
  </div>

  <!-- SETTINGS -->
  <div id="colorBlindnessSettingsScreen" class="hidden">
    <h2>Settings</h2>
    <p>Color options (not functional yet)</p>
    <button id="settingsBackButton">Back</button>
  </div>

</main>

<footer>
  <p>MobGuessr</p>
</footer>

<script src="script.js"></script>

</body>
</html>
